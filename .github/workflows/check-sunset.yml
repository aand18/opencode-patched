name: Check Upstream Patch Status

on:
  schedule:
    # Monthly on the 1st at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue #17883 (cache thinking-skip) status
        id: check_thinking_skip
        run: |
          # The lone caching-related local patch (cache-thinking-skip.patch) exists
          # because upstream marks the cache breakpoint on content[length-1], which can
          # land cache_control on a reasoning/thinking block -> Anthropic HTTP 400.
          # Tracked upstream as issue #17883. When it's CLOSED, upstream likely fixed
          # applyCaching and the patch can be dropped.
          # (The big caching.patch / PR #5422 was dropped 2026-06-02 as redundant with
          # upstream applyCaching; it is no longer monitored here.)
          ISSUE_STATE=$(gh issue view 17883 --repo anomalyco/opencode --json state --jq .state 2>/dev/null || echo "UNKNOWN")
          echo "state=$ISSUE_STATE" >> $GITHUB_OUTPUT
          echo "Cache thinking-skip issue #17883: $ISSUE_STATE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check PR #12679 (vim) status
        id: check_vim_pr
        run: |
          PR_STATE=$(gh pr view 12679 --repo anomalyco/opencode --json state --jq .state 2>/dev/null || echo "UNKNOWN")
          echo "state=$PR_STATE" >> $GITHUB_OUTPUT
          echo "Vim PR #12679: $PR_STATE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check PR #16751 (tool fix) status
        id: check_tool_fix_pr
        run: |
          PR_STATE=$(gh pr view 16751 --repo anomalyco/opencode --json state --jq .state 2>/dev/null || echo "UNKNOWN")
          echo "state=$PR_STATE" >> $GITHUB_OUTPUT
          echo "Tool fix PR #16751: $PR_STATE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check issue #15247 (MCP reconnect) status
        id: check_mcp_reconnect
        run: |
          # No upstream PR -- track the issue instead.  When it's closed,
          # upstream likely shipped the feature and this patch can be dropped.
          ISSUE_STATE=$(gh issue view 15247 --repo anomalyco/opencode --json state --jq .state 2>/dev/null || echo "UNKNOWN")
          echo "state=$ISSUE_STATE" >> $GITHUB_OUTPUT
          echo "MCP reconnect issue #15247: $ISSUE_STATE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check opus-4-7 support upstream
        id: check_opus47
        run: |
          # No upstream PR -- check if upstream source already includes opus-4-7 in isAnthropicAdaptive
          if curl -sfL "https://raw.githubusercontent.com/anomalyco/opencode/dev/packages/opencode/src/provider/transform.ts" | grep -q 'opus-4-7'; then
            echo "state=MERGED" >> $GITHUB_OUTPUT
            echo "Opus 4.7 support: present upstream"
          else
            echo "state=OPEN" >> $GITHUB_OUTPUT
            echo "Opus 4.7 support: not yet upstream"
          fi

      - name: Check eager_input_streaming workaround upstream
        id: check_eager_input_streaming
        run: |
          # The upstream PRs (#23766, #23542) that proposed a generalized fix were
          # rejected. Sunset signal: upstream's options() function in transform.ts
          # defaults toolStreaming = false for @ai-sdk/anthropic outside the
          # github-copilot-gated path. Heuristic: look for "toolStreaming" inside
          # transform.ts (currently only set inside copilot.ts via plugin hook).
          if curl -sfL "https://raw.githubusercontent.com/anomalyco/opencode/dev/packages/opencode/src/provider/transform.ts" | grep -q 'toolStreaming'; then
            echo "state=MERGED" >> $GITHUB_OUTPUT
            echo "eager_input_streaming workaround: present upstream (transform.ts now references toolStreaming -- review whether our patch is still needed)"
          else
            echo "state=OPEN" >> $GITHUB_OUTPUT
            echo "eager_input_streaming workaround: not yet upstream"
          fi

      - name: Check instance_state_partition fix upstream
        id: check_instance_state_partition
        run: |
          # No upstream PR yet -- to be filed at anomalyco/opencode after
          # multi-machine burn-in. Sunset signal: upstream server.ts no longer
          # calls `Layer.makeMemoMapUnsafe()` inside startListener (which is the
          # cause of the dual InstanceStore.Service materialization). When the
          # listener pulls from the shared memoMap, our patch can be dropped.
          # See: pigeon/docs/plans/2026-05-26-instancestate-partition-fix-design.md
          if curl -sfL "https://raw.githubusercontent.com/anomalyco/opencode/dev/packages/opencode/src/server/server.ts" | grep -q 'Layer.makeMemoMapUnsafe()'; then
            echo "state=OPEN" >> $GITHUB_OUTPUT
            echo "instance_state_partition fix: not yet upstream (listener still uses Layer.makeMemoMapUnsafe())"
          else
            echo "state=MERGED" >> $GITHUB_OUTPUT
            echo "instance_state_partition fix: upstream server.ts no longer uses Layer.makeMemoMapUnsafe() -- review whether our patch is still needed"
          fi

      # NOTE: PR #27959 (bus eager subscribe) monitor was removed on 2026-05-25 when
      # this repo cut over to upstream v1.15.10, which includes the fix natively
      # (along with the load-bearing PR #27825 fix(sync) and PR #28051 bus context).
      # The corresponding bus-eager-subscribe.patch was deleted from patches/.

      - name: Create sunset recommendation
        if: steps.check_thinking_skip.outputs.state == 'CLOSED' || steps.check_vim_pr.outputs.state == 'MERGED' || steps.check_tool_fix_pr.outputs.state == 'MERGED' || steps.check_mcp_reconnect.outputs.state == 'CLOSED' || steps.check_opus47.outputs.state == 'MERGED' || steps.check_eager_input_streaming.outputs.state == 'MERGED' || steps.check_instance_state_partition.outputs.state == 'MERGED'
        uses: actions/github-script@v7
        with:
          script: |
            const thinkingSkipState = '${{ steps.check_thinking_skip.outputs.state }}';
            const vimState = '${{ steps.check_vim_pr.outputs.state }}';
            const toolFixState = '${{ steps.check_tool_fix_pr.outputs.state }}';
            const mcpReconnectState = '${{ steps.check_mcp_reconnect.outputs.state }}';
            const opus47State = '${{ steps.check_opus47.outputs.state }}';
            const eagerInputStreamingState = '${{ steps.check_eager_input_streaming.outputs.state }}';
            const instanceStatePartitionState = '${{ steps.check_instance_state_partition.outputs.state }}';
            const allMerged = thinkingSkipState === 'CLOSED' && vimState === 'MERGED' && toolFixState === 'MERGED' && mcpReconnectState === 'CLOSED' && opus47State === 'MERGED' && eagerInputStreamingState === 'MERGED' && instanceStatePartitionState === 'MERGED';

            // Collect which PRs/issues are resolved
            const merged = [];
            const remaining = [];
            if (thinkingSkipState === 'CLOSED') merged.push('Cache thinking-skip #17883');
            else remaining.push('Cache thinking-skip #17883');
            if (vimState === 'MERGED') merged.push('Vim PR #12679');
            else remaining.push('Vim PR #12679');
            if (toolFixState === 'MERGED') merged.push('Tool fix PR #16751');
            else remaining.push('Tool fix PR #16751');
            if (mcpReconnectState === 'CLOSED') merged.push('MCP reconnect #15247');
            else remaining.push('MCP reconnect #15247');
            if (opus47State === 'MERGED') merged.push('Opus 4.7 support');
            else remaining.push('Opus 4.7 support');
            if (eagerInputStreamingState === 'MERGED') merged.push('Eager input streaming workaround');
            else remaining.push('Eager input streaming workaround');
            if (instanceStatePartitionState === 'MERGED') merged.push('InstanceState partition fix');
            else remaining.push('InstanceState partition fix');

            let title, body;

            if (allMerged) {
              title = 'All upstream PRs merged - sunset this repo';
              body = `
            ## All Patches Merged Upstream

            - **Cache thinking-skip #17883**: CLOSED
            - **Vim PR #12679**: MERGED
            - **Tool fix PR #16751**: MERGED
            - **MCP reconnect #15247**: CLOSED
            - **Opus 4.7 support**: MERGED
            - **Eager input streaming workaround**: MERGED
            - **InstanceState partition fix**: MERGED

            All patches are now available in official OpenCode releases. This repo can be archived.

            ### Recommended Actions

            1. Verify the latest upstream release includes all features
            2. Update [workstation](https://github.com/johnnymo87/workstation) to use upstream OpenCode directly
            3. Archive this repository (opencode-cached was already archived 2026-06-02)
              `;
            } else {
              title = `${merged.join(', ')} merged - update patches`;
              body = `
            ## Upstream PRs Merged

            - **Cache thinking-skip #17883**: ${thinkingSkipState}
            - **Vim PR #12679**: ${vimState}
            - **Tool fix PR #16751**: ${toolFixState}
            - **MCP reconnect #15247**: ${mcpReconnectState}
            - **Opus 4.7 support**: ${opus47State}
            - **Eager input streaming workaround**: ${eagerInputStreamingState}
            - **InstanceState partition fix**: ${instanceStatePartitionState}

            Merged: ${merged.join(', ')}
            Remaining: ${remaining.join(', ')}

            ### Recommended Actions

            1. Remove the merged patch(es) from \`patches/apply.sh\`
            2. Keep applying the remaining patch(es)
            3. If all remaining patches are also merged later, archive this repo
              `;
            }

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sunset-check'
            });

            const existingIssue = issues.data.find(i => i.labels.some(l => l.name === 'sunset-check'));

            if (existingIssue) {
              console.log(`Issue already exists: #${existingIssue.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Monthly check (${new Date().toISOString().split('T')[0]}): Cache thinking-skip #17883: ${thinkingSkipState}, Vim PR: ${vimState}, Tool fix PR: ${toolFixState}, MCP reconnect: ${mcpReconnectState}, Opus 4.7: ${opus47State}, Eager input streaming: ${eagerInputStreamingState}, InstanceState partition: ${instanceStatePartitionState}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['sunset-check', 'review-needed']
              });
              console.log('Created sunset issue');
            }

      - name: Report status
        run: |
          echo "Monthly upstream check complete"
          echo "Cache thinking-skip #17883: ${{ steps.check_thinking_skip.outputs.state }}"
          echo "Vim PR #12679: ${{ steps.check_vim_pr.outputs.state }}"
          echo "Tool fix PR #16751: ${{ steps.check_tool_fix_pr.outputs.state }}"
          echo "MCP reconnect #15247: ${{ steps.check_mcp_reconnect.outputs.state }}"
          echo "Opus 4.7 support: ${{ steps.check_opus47.outputs.state }}"
          echo "Eager input streaming workaround: ${{ steps.check_eager_input_streaming.outputs.state }}"
          echo "InstanceState partition fix: ${{ steps.check_instance_state_partition.outputs.state }}"
