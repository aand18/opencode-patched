name: Build and Release Patched OpenCode

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenCode version to build (without v prefix, e.g., 1.2.27)'
        required: true
        type: string
      revision:
        description: 'Patched revision suffix (optional; e.g. "1" → v<version>-patched.1). Use when re-releasing the same upstream version with updated patches.'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      revision:
        required: false
        type: string
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout opencode-patched
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone upstream opencode
        run: |
          git clone --depth 1 --branch v${{ inputs.version }} \
            https://github.com/anomalyco/opencode.git opencode-src
          cd opencode-src
          echo "Cloned opencode v${{ inputs.version }}"
          git log -1 --oneline

      - name: Apply patches
        run: |
          cd opencode-src
          ../patches/apply.sh .

      - name: Install dependencies
        run: |
          cd opencode-src
          bun install

      - name: Build CLI
        run: |
          cd opencode-src/packages/opencode
          bun run script/build.ts --all

          echo ""
          echo "Build completed. Artifacts:"
          ls -lh dist/
        env:
          OPENCODE_VERSION: ${{ inputs.version }}

      - name: Extract Linux arm64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-linux-arm64
          tar czf /tmp/opencode-linux-arm64.tar.gz .
          echo "Created: $(ls -lh /tmp/opencode-linux-arm64.tar.gz)"

      - name: Extract Linux x64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-linux-x64
          tar czf /tmp/opencode-linux-x64.tar.gz .
          echo "Created: $(ls -lh /tmp/opencode-linux-x64.tar.gz)"

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-linux-arm64
          path: /tmp/opencode-linux-arm64.tar.gz
          retention-days: 1

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-linux-x64
          path: /tmp/opencode-linux-x64.tar.gz
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout opencode-patched
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone upstream opencode
        run: |
          git clone --depth 1 --branch v${{ inputs.version }} \
            https://github.com/anomalyco/opencode.git opencode-src
          cd opencode-src
          echo "Cloned opencode v${{ inputs.version }}"
          git log -1 --oneline

      - name: Apply patches
        run: |
          cd opencode-src
          ../patches/apply.sh .

      - name: Install dependencies
        run: |
          cd opencode-src
          bun install

      - name: Build CLI
        run: |
          cd opencode-src/packages/opencode
          bun run script/build.ts --all

          echo ""
          echo "Build completed. Artifacts:"
          ls -lh dist/
        env:
          OPENCODE_VERSION: ${{ inputs.version }}
          # Bun 1.3.12 has a regression (oven-sh/bun#29120, fixed in #29272)
          # where its built-in Mach-O codesigner writes an LC_CODE_SIGNATURE
          # with datasize smaller than the SuperBlob it actually stamps. macOS
          # kernels (Sequoia 15.4+) SIGKILL the resulting binary on launch,
          # and subsequent `codesign --sign -` calls fail with "invalid or
          # unsupported format for signature".
          #
          # Disable Bun's internal signer so the output has no LC_CODE_SIGNATURE
          # slot at all, then ad-hoc sign it ourselves below. Remove this env
          # var once Bun >1.3.12 ships.
          BUN_NO_CODESIGN_MACHO_BINARY: "1"

      # Ad-hoc sign the freshly-built Mach-O binaries. Without a valid
      # signature, macOS (Apple Silicon, Sequoia 15.4+) SIGKILLs the binary
      # on launch with exit 9. We do this ourselves because Bun's internal
      # signer is disabled via BUN_NO_CODESIGN_MACHO_BINARY above.
      - name: Ad-hoc codesign macOS binaries
        run: |
          for arch in arm64 x64; do
            bin="opencode-src/packages/opencode/dist/opencode-darwin-${arch}/bin/opencode"
            echo "Signing ${bin}"
            codesign --force --sign - "${bin}"
            codesign -dv "${bin}" 2>&1 | grep -E "^(Executable|Signature|Format|CodeDirectory)"
          done

      - name: Smoke test signed arm64 binary
        run: |
          bin="opencode-src/packages/opencode/dist/opencode-darwin-arm64/bin/opencode"
          "${bin}" --version

      - name: Extract macOS arm64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-darwin-arm64
          zip -r /tmp/opencode-darwin-arm64.zip .
          echo "Created: $(ls -lh /tmp/opencode-darwin-arm64.zip)"

      - name: Extract macOS x64 binary
        run: |
          cd opencode-src/packages/opencode/dist/opencode-darwin-x64
          zip -r /tmp/opencode-darwin-x64.zip .
          echo "Created: $(ls -lh /tmp/opencode-darwin-x64.zip)"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-darwin-arm64
          path: /tmp/opencode-darwin-arm64.zip
          retention-days: 1

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-darwin-x64
          path: /tmp/opencode-darwin-x64.zip
          retention-days: 1

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          # Tag is v<version>-patched[.<revision>]. Empty revision keeps the
          # legacy single-release-per-version naming; non-empty appends ".N"
          # so re-releases of the same upstream version (e.g. when a new
          # patch lands without an upstream version bump) don't collide.
          REV='${{ inputs.revision }}'
          if [ -z "$REV" ]; then
            TAG="v${{ inputs.version }}-patched"
          else
            TAG="v${{ inputs.version }}-patched.${REV}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: OpenCode v${{ inputs.version }} with Caching + Local Patches${{ inputs.revision && format(' (rev .{0})', inputs.revision) || '' }}
          body: |
            # OpenCode v${{ inputs.version }} with Caching + Local Patches

            This release applies ten patches to OpenCode v${{ inputs.version }}:

            1. **Prompt caching improvements** from [PR #5422](https://github.com/anomalyco/opencode/pull/5422) (via [opencode-cached](https://github.com/johnnymo87/opencode-cached))
            2. **Prompt-loop byte identity** from [PR #25367](https://github.com/anomalyco/opencode/pull/25367)
            3. **Cache-aligned compaction** from [PR #25100](https://github.com/anomalyco/opencode/pull/25100)
            4. **Gemini empty parts fix** from [PR #28669](https://github.com/anomalyco/opencode/pull/28669)
            5. **Vim keybindings** from [PR #12679](https://github.com/anomalyco/opencode/pull/12679)
            6. **Tool use/result mismatch fix** from [PR #16751](https://github.com/anomalyco/opencode/pull/16751)
            7. **MCP auto-reconnect** from [Issue #15247](https://github.com/anomalyco/opencode/issues/15247)
            8. **Eager input streaming workaround** for [Issue #23541](https://github.com/anomalyco/opencode/issues/23541) -- defaults `toolStreaming = false` for all `@ai-sdk/anthropic`-backed providers (Vertex Anthropic, Bedrock proxies, etc.)
            9. **Prefill race fix** for session-route workspace binding
            10. **Bus eager subscribe** from [PR #27959](https://github.com/sst/opencode/pull/27959) -- closes the plugin event-loss race that drops `message.updated` events and breaks plugin-driven notifications (sunset when upstream version > v1.15.0 is targeted)

            ## Caching Improvements

            - Provider-specific cache configuration for 19+ providers
            - Improved cache breakpoint logic with `maxBreakpoints` support
            - ~44% reduction in cache writes, ~73% reduction in effective cost

            ## Prompt Cache Alignment

            Prompt-loop byte identity preserves the conversation array across tool-call continuations, reducing cache misses from unchanged prompt tails. Cache-aligned compaction reuses normal prompt-loop context for compaction calls when provider/model conditions allow, so future compactions can reuse the same prefix cache.

            ## Gemini Empty Parts Fix

            Pads completely empty Gemini user, assistant, or tool messages with an empty string text part before request serialization. This avoids Vertex/Gemini rejecting `parts: []` with `Unable to submit request because it must include at least one parts field`.

            ## Vim Keybindings

            Enable with `tui.vim: true` in config or toggle from command palette. Disabled by default.

            - Mode switching: `i I a A o O S`, `cc`, `cw`, `Esc`
            - Motions: `h j k l`, `w b e`, `W B E`, `0 ^ $`
            - Deletes: `x`, `dd`, `dw`
            - Session navigation: `gg/G`
            - Scrolling: `Ctrl+e/y/d/u/f/b`
            - `Enter` in normal mode submits

            ## Tool Use/Result Mismatch Fix

            Fixes the widespread `tool_use ids were found without tool_result blocks` error ([#16749](https://github.com/anomalyco/opencode/issues/16749)) that corrupts sessions when stream errors cause lost step boundaries. Injects synthetic step-start boundaries at reconstruction time to prevent interleaved tool_use/text in assistant messages.

            ## MCP Auto-Reconnect

            Automatically reconnects remote MCP servers when the server restarts and the session becomes stale. Without this, tool calls fail with transport errors requiring a manual MCP toggle or OpenCode restart.

            ## Eager Input Streaming Workaround

            Disables `toolStreaming` for all `@ai-sdk/anthropic`-backed providers (including `@ai-sdk/google-vertex/anthropic`). Since `@ai-sdk/anthropic >= 3.0.58`, the SDK injects `eager_input_streaming: true` into every tool definition, which Anthropic-shape proxies (Google Vertex, AWS Bedrock, GitHub Copilot, corporate gateways) reject with `tools.0.custom.eager_input_streaming: Extra inputs are not permitted`. Upstream only fixes this for `github-copilot`; this patch generalizes the workaround.

            ## Bus Eager Subscribe

            Cherry-picks upstream commit `cb3549324` (PR #27959), merged 2026-05-18 -- 4 days AFTER v1.15.0 was tagged, so v1.15.0 ships the bug. The fix changes `bus.subscribe` / `bus.subscribeAll` to return `Effect<Stream, _, Scope>` so callers `yield*` them, which establishes the underlying PubSub subscription eagerly in the caller's Scope. The previous lazy-acquisition pattern lost any events published in the race window between plugin init and stream consumption start; in practice this drops high-frequency `message.updated` events and breaks plugin-driven Telegram stop notifications (pigeon bead ccr-mu1). **Sunset criterion**: when this repo upgrades to an upstream version > v1.15.0, delete `patches/bus-eager-subscribe.patch` and its block in `apply.sh` (the fix is already in any release newer than v1.15.0).

            ## Installation

            ### Linux (arm64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/${{ steps.tag.outputs.tag }}/opencode-linux-arm64.tar.gz | tar xz
            ./bin/opencode --version
            ```

            ### Linux (x64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/${{ steps.tag.outputs.tag }}/opencode-linux-x64.tar.gz | tar xz
            ./bin/opencode --version
            ```

            ### macOS (arm64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/${{ steps.tag.outputs.tag }}/opencode-darwin-arm64.zip -o opencode.zip && unzip opencode.zip
            ./bin/opencode --version
            ```

            ### macOS (x64)
            ```bash
            curl -sL https://github.com/johnnymo87/opencode-patched/releases/download/${{ steps.tag.outputs.tag }}/opencode-darwin-x64.zip -o opencode.zip && unzip opencode.zip
            ./bin/opencode --version
            ```

            ---

            **Upstream**: [anomalyco/opencode v${{ inputs.version }}](https://github.com/anomalyco/opencode/releases/tag/v${{ inputs.version }})
            **Caching patch**: [opencode-cached](https://github.com/johnnymo87/opencode-cached) / [PR #5422](https://github.com/anomalyco/opencode/pull/5422)
            **Prompt-loop cache patch**: [PR #25367](https://github.com/anomalyco/opencode/pull/25367)
            **Cache-aligned compaction patch**: [PR #25100](https://github.com/anomalyco/opencode/pull/25100)
            **Vim patch**: [PR #12679](https://github.com/anomalyco/opencode/pull/12679)
            **Tool fix patch**: [PR #16751](https://github.com/anomalyco/opencode/pull/16751)
            **MCP reconnect**: [Issue #15247](https://github.com/anomalyco/opencode/issues/15247)
            **Eager input streaming**: [Issue #23541](https://github.com/anomalyco/opencode/issues/23541)
            **Prefill race fix**: local route binding patch
            **Bus eager subscribe**: [PR #27959](https://github.com/sst/opencode/pull/27959)
          files: |
            artifacts/opencode-linux-arm64.tar.gz
            artifacts/opencode-linux-x64.tar.gz
            artifacts/opencode-darwin-arm64.zip
            artifacts/opencode-darwin-x64.zip
            artifacts/checksums.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-on-failure:
    needs: [build-linux, build-macos, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.version }}';
            const title = `Build failed for v${version}`;
            const body = `
            ## Build Failure: v${version}

            The automated build for OpenCode v${version} with caching + local patches failed.

            **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Possible Causes

            1. **Caching patch conflict**: The caching patch (fetched from opencode-cached) may not apply to v${version}
            2. **Prompt-loop cache patch conflict**: The local prompt-loop-cache.patch may not apply to v${version}
            3. **Cache-aligned compaction patch conflict**: The local cache-aligned-compaction.patch may not apply to v${version}
            4. **Vim patch conflict**: The local vim.patch may not apply to v${version}
            5. **Tool fix patch conflict**: The local tool-fix.patch may not apply to v${version}
            6. **MCP reconnect patch conflict**: The local mcp-reconnect.patch may not apply to v${version}
            7. **Eager input streaming patch conflict**: The local eager-input-streaming.patch may not apply to v${version}
            8. **Prefill fix patch conflict**: The local prefill-fix.patch may not apply to v${version}
            9. **Bus eager subscribe patch conflict**: The local bus-eager-subscribe.patch may not apply to v${version}. If upstream v${version} is newer than v1.15.0, the fix (cb3549324, PR #27959) is already included upstream -- DROP this patch (remove patches/bus-eager-subscribe.patch and its block in apply.sh).
            10. **Build failure**: OpenCode build process may have changed

            ### Action Required

            1. Check the workflow logs above
            2. If caching patch failed, check [opencode-cached](https://github.com/johnnymo87/opencode-cached) for updates
            3. If prompt-loop cache patch failed, regenerate from [PR #25367](https://github.com/anomalyco/opencode/pull/25367):
               \`\`\`bash
               gh pr diff 25367 --repo anomalyco/opencode > patches/prompt-loop-cache.patch
               # Review changes, commit and push
               \`\`\`
            4. If cache-aligned compaction patch failed, regenerate from [PR #25100](https://github.com/anomalyco/opencode/pull/25100):
               \`\`\`bash
               gh pr diff 25100 --repo anomalyco/opencode > patches/cache-aligned-compaction.patch
               # Review changes, commit and push
               \`\`\`
            5. If vim patch failed, regenerate from [PR #12679](https://github.com/anomalyco/opencode/pull/12679):
               \`\`\`bash
               gh pr diff 12679 --repo anomalyco/opencode > patches/vim.patch
               # Review changes, filter if needed, commit and push
               \`\`\`
            6. If tool fix patch failed, regenerate from [PR #16751](https://github.com/anomalyco/opencode/pull/16751):
               \`\`\`bash
               gh pr diff 16751 --repo anomalyco/opencode > patches/tool-fix.patch
               # Review changes, commit and push
               \`\`\`
            7. If MCP reconnect patch failed, review upstream changes to \`mcp/index.ts\` and update manually
            8. If prefill fix patch failed, review upstream route/middleware changes and update manually
            9. If bus eager subscribe patch failed AND upstream v${version} > v1.15.0, the fix is already upstream -- drop the patch (see patches/bus-eager-subscribe.patch SUNSET CRITERION comment in apply.sh)
            10. Re-run: \`gh workflow run build-release.yml --field version=${version}\` (or add \`--field revision=N\` to re-release the same upstream version with updated patches; the release tag becomes \`v${version}-patched.N\`)
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'build-failure'
            });

            const existingIssue = issues.data.find(i => i.title === title);

            if (existingIssue) {
              console.log(`Issue already exists: #${existingIssue.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Another build failure occurred. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['build-failure', 'automated']
              });
              console.log('Created issue: ' + title);
            }
